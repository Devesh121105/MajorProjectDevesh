<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waste Analyzer | Smart Waste Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: url('/static/background.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 0px rgba(76, 175, 80, 0); }
            50% { text-shadow: 0 0 15px rgba(76, 175, 80, 0.8), 0 0 5px rgba(76, 175, 80, 0.5); }
            100% { text-shadow: 0 0 0px rgba(76, 175, 80, 0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .navbar { 
            background: rgba(255,255,255,0.95); 
            padding: 15px 0; 
            box-shadow: 0 2px 20px rgba(0,0,0,0.1); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        
        .navbar-brand {
            animation: slideIn 0.6s ease-out;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .green-logo {
            display: flex;
            flex-direction: column;
            line-height: 1.1;
        }
        
        .waste-text {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }
        
        .web-text {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #27ae60, #1e8449);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: glow 1.5s ease-in-out infinite;
            margin-left: 5px;
        }
        
        .analyzer-text {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #1e8449, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-top: 2px;
        }
        
        .fa-leaf {
            font-size: 2rem;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: bounce 2s ease-in-out infinite;
        }
        
        .hero-section { 
            padding: 40px 0 20px; 
            text-align: center; 
            color: white; 
            animation: fadeInUp 0.8s ease-out;
        }
        
        .hero-section h1 { 
            font-size: 2.5rem; 
            font-weight: 800; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .hero-section p {
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .selection-card { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 30px; 
            margin: 20px auto; 
            max-width: 600px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }
        
        .form-select, .form-control { 
            border-radius: 10px; 
            padding: 12px; 
            margin-bottom: 15px; 
        }
        
        .analyze-btn { 
            background: linear-gradient(135deg, #2ecc71, #27ae60); 
            border: none; 
            padding: 12px 30px; 
            border-radius: 50px; 
            font-weight: bold; 
            width: 100%; 
            transition: transform 0.2s; 
        }
        
        .analyze-btn:hover { transform: translateY(-2px); }
        
        .reset-btn { 
            background: linear-gradient(135deg, #e74c3c, #c0392b); 
            border: none; 
            padding: 12px 30px; 
            border-radius: 50px; 
            font-weight: bold; 
            width: 100%; 
            margin-top: 10px; 
            transition: transform 0.2s; 
        }
        
        .reset-btn:hover { transform: translateY(-2px); }
        
        .result-card { 
            background: rgba(255,255,255,0.95); 
            border-radius: 20px; 
            padding: 25px; 
            margin-top: 20px; 
            display: none; 
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.5s ease-out;
        }
        
        .stat-card { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            margin-bottom: 15px; 
            transition: transform 0.2s; 
        }
        
        .stat-card:hover { transform: translateY(-3px); }
        
        .stat-value { 
            font-size: 1.8rem; 
            font-weight: bold; 
            color: #2ecc71; 
        }
        
        .risk-critical { background: #dc3545; color: white; }
        .risk-high { background: #fd7e14; color: white; }
        .risk-medium { background: #ffc107; }
        .risk-low { background: #28a745; color: white; }
        
        .loading { display: none; text-align: center; padding: 20px; }
        .spinner-border { width: 3rem; height: 3rem; }
        
        .historical-card { 
            background: white; 
            border-radius: 20px; 
            padding: 20px; 
            margin-top: 20px; 
        }
        
        .chart-container { height: 300px; position: relative; }
        
        .model-badge { 
            display: inline-block; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-size: 0.8rem; 
            margin: 3px; 
        }
        
        .model-rf { background: #3498db; color: white; }
        .model-xgb { background: #2ecc71; color: white; }
        .model-gb { background: #e67e22; color: white; }
        .model-nn { background: #9b59b6; color: white; }
        
        .measure-list { list-style: none; padding: 0; }
        .measure-list li { 
            padding: 8px 0; 
            border-bottom: 1px solid #eee; 
            font-size: 0.9rem; 
        }
        .measure-list li:before { 
            content: "✓"; 
            color: #2ecc71; 
            font-weight: bold; 
            margin-right: 10px; 
        }
        
        .alert-banner { 
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); 
            color: white; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            display: none; 
        }
        
        .alert-banner.show { 
            display: block; 
            animation: slideDown 0.5s ease; 
        }
        
        @keyframes slideDown { 
            from { opacity: 0; transform: translateY(-20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        footer { 
            text-align: center; 
            padding: 30px; 
            color: white; 
            opacity: 0.8; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        @media (max-width: 768px) { 
            .hero-section h1 { font-size: 1.8rem; } 
            .stat-value { font-size: 1.3rem; }
            .waste-text, .web-text { font-size: 1rem; }
        }
        
        .btn-outline-primary {
            border-color: #2ecc71;
            color: #2ecc71;
        }
        
        .btn-outline-primary:hover {
            background: #2ecc71;
            border-color: #2ecc71;
            color: white;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border: none;
        }
        
        .btn-primary:hover {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            transform: scale(1.02);
        }
        
        .btn-outline-info {
            border-color: #17a2b8;
            color: #17a2b8;
        }
        
        .btn-outline-info:hover {
            background: #17a2b8;
            border-color: #17a2b8;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-leaf"></i>
                <div class="green-logo">
                    <div style="display: flex; align-items: baseline;">
                        <span class="waste-text">WASTE</span>
                        <span class="web-text">WEB</span>
                    </div>
                    <span class="analyzer-text">ANALYZER</span>
                </div>
            </a>
            <div>
                <a href="/about" class="btn btn-outline-info me-2"><i class="fas fa-info-circle"></i> About Us</a>
                <a href="/compare-cities" class="btn btn-outline-primary me-2" id="compareCitiesBtn"><i class="fas fa-chart-line"></i> Compare Cities</a>
                <a href="/chatbot" class="btn btn-primary" id="chatbotBtn"><i class="fas fa-robot"></i> AI Assistant</a>
            </div>
        </div>
    </nav>
    
    <div class="hero-section">
        <div class="container">
            <h1><i class="fas fa-recycle"></i> Waste Management Analyzer</h1>
            <p>Select a city and area to get AI-powered waste analysis</p>
        </div>
    </div>
    
    <div class="container">
        <div class="selection-card">
            <h4 class="text-center mb-4">📍 Select Location</h4>
            <select id="citySelect" class="form-select"><option value="">Select City...</option></select>
            <select id="subareaSelect" class="form-select" disabled><option value="">First select a city...</option></select>
            <button class="analyze-btn btn btn-primary" onclick="analyzeArea()"><i class="fas fa-chart-line"></i> Analyze Waste Management</button>
            <button class="reset-btn btn" onclick="resetForm()"><i class="fas fa-undo-alt"></i> Reset / Start Over</button>
        </div>
        
        <div class="loading" id="loading"><div class="spinner-border text-primary"></div><p class="mt-2">Analyzing data...</p></div>
        <div id="resultCard" class="result-card"></div>
    </div>
    
    <footer>
        <p><i class="fas fa-chart-line"></i> AI-Powered Waste Management System</p>
    </footer>
    
    <script>
        let wasteChart, predictionChart, historicalChart;
        let currentCity = '', currentSubarea = '';
        let isRestoring = false;
        let lastData = null;
        
        function saveCurrentState() {
            const citySelect = document.getElementById('citySelect');
            const subareaSelect = document.getElementById('subareaSelect');
            const resultCard = document.getElementById('resultCard');
            
            if (citySelect && citySelect.value) {
                sessionStorage.setItem('wm_selectedCity', citySelect.value);
            }
            if (subareaSelect && subareaSelect.value && subareaSelect.value !== 'First select a city...' && subareaSelect.value !== 'Loading...') {
                sessionStorage.setItem('wm_selectedSubarea', subareaSelect.value);
            }
            if (resultCard && resultCard.style.display === 'block') {
                sessionStorage.setItem('wm_hasResults', 'true');
                sessionStorage.setItem('wm_scrollPos', window.scrollY);
            } else {
                sessionStorage.removeItem('wm_hasResults');
            }
            
            if (lastData) {
                sessionStorage.setItem('wm_lastData', JSON.stringify(lastData));
            }
        }
        
        window.addEventListener('beforeunload', function() {
            saveCurrentState();
        });
        
        document.getElementById('compareCitiesBtn')?.addEventListener('click', function(e) {
            saveCurrentState();
        });
        
        document.getElementById('chatbotBtn')?.addEventListener('click', function(e) {
            saveCurrentState();
        });
        
        window.addEventListener('load', function() {
            const savedCity = sessionStorage.getItem('wm_selectedCity');
            const savedSubarea = sessionStorage.getItem('wm_selectedSubarea');
            const hasResults = sessionStorage.getItem('wm_hasResults');
            const savedScroll = sessionStorage.getItem('wm_scrollPos');
            const savedData = sessionStorage.getItem('wm_lastData');
            
            if (savedCity && savedCity !== '') {
                isRestoring = true;
                document.getElementById('citySelect').value = savedCity;
                loadSubareasAndRestore(savedCity, savedSubarea, hasResults === 'true', savedData);
            }
            
            if (savedScroll) {
                setTimeout(() => window.scrollTo(0, parseInt(savedScroll)), 500);
            }
        });
        
        function loadSubareasAndRestore(city, savedSubarea, shouldAnalyze, savedData) {
            const subareaSelect = document.getElementById('subareaSelect');
            subareaSelect.innerHTML = '<option value="">Loading...</option>';
            subareaSelect.disabled = true;
            
            fetch('/api/subareas', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ city: city })
            })
            .then(res => res.json())
            .then(data => {
                subareaSelect.innerHTML = '<option value="">Select Sub-area...</option>';
                data.subareas.forEach(subarea => {
                    const option = document.createElement('option');
                    option.value = subarea;
                    option.textContent = subarea;
                    subareaSelect.appendChild(option);
                });
                subareaSelect.disabled = false;
                
                if (savedSubarea && savedSubarea !== '' && data.subareas.includes(savedSubarea)) {
                    subareaSelect.value = savedSubarea;
                    currentCity = city;
                    currentSubarea = savedSubarea;
                    
                    if (shouldAnalyze) {
                        if (savedData) {
                            try {
                                const restoredData = JSON.parse(savedData);
                                lastData = restoredData;
                                displayResults(restoredData);
                                document.getElementById('resultCard').style.display = 'block';
                            } catch(e) {
                                setTimeout(() => analyzeArea(), 500);
                            }
                        } else {
                            setTimeout(() => analyzeArea(), 500);
                        }
                    }
                }
                isRestoring = false;
            });
        }
        
        fetch('/api/cities').then(res => res.json()).then(data => {
            const citySelect = document.getElementById('citySelect');
            citySelect.innerHTML = '<option value="">Select City...</option>';
            data.cities.forEach(city => { 
                const option = document.createElement('option'); 
                option.value = city; 
                option.textContent = city; 
                citySelect.appendChild(option); 
            });
        });
        
        document.getElementById('citySelect').addEventListener('change', function() {
            const city = this.value;
            currentCity = city;
            if (city) {
                loadSubareas(city);
            } else {
                document.getElementById('subareaSelect').innerHTML = '<option value="">First select a city...</option>';
                document.getElementById('subareaSelect').disabled = true;
                document.getElementById('resultCard').style.display = 'none';
                lastData = null;
            }
        });
        
        function loadSubareas(city) {
            const subareaSelect = document.getElementById('subareaSelect');
            subareaSelect.innerHTML = '<option value="">Loading...</option>';
            subareaSelect.disabled = true;
            fetch('/api/subareas', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ city: city }) 
            })
            .then(res => res.json())
            .then(data => {
                subareaSelect.innerHTML = '<option value="">Select Sub-area...</option>';
                data.subareas.forEach(subarea => { 
                    const option = document.createElement('option'); 
                    option.value = subarea; 
                    option.textContent = subarea; 
                    subareaSelect.appendChild(option); 
                });
                subareaSelect.disabled = false;
            });
        }
        
        function resetForm() {
            document.getElementById('citySelect').value = '';
            document.getElementById('subareaSelect').innerHTML = '<option value="">First select a city...</option>';
            document.getElementById('subareaSelect').disabled = true;
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('resultCard').innerHTML = '';
            currentCity = '';
            currentSubarea = '';
            lastData = null;
            sessionStorage.removeItem('wm_selectedCity');
            sessionStorage.removeItem('wm_selectedSubarea');
            sessionStorage.removeItem('wm_hasResults');
            sessionStorage.removeItem('wm_scrollPos');
            sessionStorage.removeItem('wm_lastData');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            const alertDiv = document.createElement('div'); 
            alertDiv.className = 'alert alert-success alert-dismissible fade show mt-3'; 
            alertDiv.innerHTML = '✓ Form reset successfully! Select a new city and area to analyze.';
            document.querySelector('.selection-card').appendChild(alertDiv); 
            setTimeout(() => alertDiv.remove(), 3000);
        }
        
        function analyzeArea() {
            const citySelect = document.getElementById('citySelect');
            const subareaSelect = document.getElementById('subareaSelect');
            const city = citySelect.value;
            const subarea = subareaSelect.value;
            
            if (!city) {
                alert('Please select a City first');
                citySelect.focus();
                return;
            }
            
            if (!subarea || subarea === '' || subarea === 'Select Sub-area...' || subarea === 'First select a city...') {
                alert('Please select a Sub-area');
                subareaSelect.focus();
                return;
            }
            
            currentCity = city; 
            currentSubarea = subarea;
            
            document.getElementById('loading').style.display = 'block'; 
            document.getElementById('resultCard').style.display = 'none';
            
            fetch('/api/area_data', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ city: city, subarea: subarea }) 
            })
            .then(res => res.json())
            .then(data => { 
                lastData = data;
                displayResults(data); 
                document.getElementById('loading').style.display = 'none'; 
                document.getElementById('resultCard').style.display = 'block';
                saveCurrentState();
            })
            .catch(err => { 
                console.error('Error:', err); 
                alert('Error loading data. Please try again.'); 
                document.getElementById('loading').style.display = 'none'; 
            });
        }
        
        function displayResults(data) {
            const riskClass = `risk-${data.risk_level.toLowerCase()}`;
            const html = `<div class="text-center mb-4"><h3>📍 ${data.subarea}, ${data.city}</h3><p>${data.live_aqi.description} AQI | ${data.risk_level} Risk Level</p></div>
                ${data.risk_level === 'Critical' || data.risk_level === 'High' ? `<div class="alert-banner show ${riskClass}" style="background: ${data.risk_level === 'Critical' ? '#dc3545' : '#fd7e14'}"><div style="display: flex; align-items: center;"><i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-right: 15px;"></i><div><strong>${data.risk_level === 'Critical' ? '🚨 CRITICAL ALERT' : '⚠️ HIGH RISK ALERT'}</strong><br>Immediate action required! Review control measures below.</div></div></div>` : ''}
                <div class="row"><div class="col-md-3"><div class="stat-card"><i class="fas fa-chart-line fa-2x mb-2"></i><div class="stat-value">${Math.round(data.current_waste).toLocaleString()} kg</div><div>Daily Waste</div></div></div>
                <div class="col-md-3"><div class="stat-card"><i class="fas fa-leaf fa-2x mb-2"></i><div class="stat-value">${data.recycling_rate}%</div><div>Recycling Rate</div></div></div>
                <div class="col-md-3"><div class="stat-card"><i class="fas fa-wind fa-2x mb-2"></i><div class="stat-value">${data.live_aqi.value}</div><div>Current AQI</div></div></div>
                <div class="col-md-3"><div class="stat-card ${riskClass}"><i class="fas fa-shield-alt fa-2x mb-2"></i><div class="stat-value">${data.risk_level}</div><div>Risk Level</div></div></div></div>
                <div class="row mt-4"><div class="col-md-6"><h5><i class="fas fa-chart-pie"></i> Waste Type Distribution</h5><div class="chart-container"><canvas id="wasteChart"></canvas></div></div>
                <div class="col-md-6"><h5><i class="fas fa-chart-line"></i> 7-Day Waste Prediction</h5><div class="chart-container"><canvas id="predictionChart"></canvas></div></div></div>
                <div class="historical-card mt-4"><h5><i class="fas fa-history"></i> Historical Waste Generation Trend (Last 30 Days)</h5><div class="chart-container" style="height: 300px;"><canvas id="historicalChart"></canvas></div><small class="text-muted">Historical data shows waste generation patterns over time</small></div>
                <div class="row mt-4"><div class="col-md-6"><h5><i class="fas fa-brain"></i> AI Classification Results</h5><div class="bg-light p-3 rounded"><p><strong>🎯 Consensus:</strong> <span class="badge bg-primary">${data.classification.consensus}</span></p><div class="row">
                <div class="col-6 mb-2"><div class="model-badge model-rf" style="display: block; text-align: center;">Random Forest<br><small>${data.classification.random_forest.type}</small><br><small>${Math.round(data.classification.random_forest.confidence * 100)}% confident</small></div></div>
                <div class="col-6 mb-2"><div class="model-badge model-xgb" style="display: block; text-align: center;">XGBoost<br><small>${data.classification.xgboost.type}</small><br><small>${Math.round(data.classification.xgboost.confidence * 100)}% confident</small></div></div>
                <div class="col-6 mb-2"><div class="model-badge model-gb" style="display: block; text-align: center;">Gradient Boosting<br><small>${data.classification.gradient_boosting.type}</small><br><small>${Math.round(data.classification.gradient_boosting.confidence * 100)}% confident</small></div></div>
                <div class="col-6 mb-2"><div class="model-badge model-nn" style="display: block; text-align: center;">Neural Network<br><small>${data.classification.neural_network.type}</small><br><small>${Math.round(data.classification.neural_network.confidence * 100)}% confident</small></div></div></div></div></div>
                <div class="col-md-6"><h5><i class="fas fa-clipboard-list"></i> Control Measures</h5><div class="bg-light p-3 rounded" style="max-height: 300px; overflow-y: auto;"><ul class="measure-list">${data.control_measures.map(m => `<li>${m}</li>`).join('')}</ul>${data.risk_level === 'Critical' ? '<div class="alert alert-danger mt-3"><i class="fas fa-phone-alt"></i> Emergency Contact: Municipal Corporation Control Room</div>' : ''}</div></div></div>`;
            
            document.getElementById('resultCard').innerHTML = html;
            
            if (wasteChart) { wasteChart.destroy(); wasteChart = null; }
            if (predictionChart) { predictionChart.destroy(); predictionChart = null; }
            if (historicalChart) { historicalChart.destroy(); historicalChart = null; }
            
            setTimeout(() => {
                const wasteCanvas = document.getElementById('wasteChart');
                if (wasteCanvas) {
                    const ctx1 = wasteCanvas.getContext('2d');
                    wasteChart = new Chart(ctx1, { 
                        type: 'doughnut', 
                        data: { labels: data.waste_types, datasets: [{ data: data.waste_distribution, backgroundColor: ['#3498db', '#2ecc71', '#e74c3c', '#f39c12', '#9b59b6'], borderWidth: 0 }] }, 
                        options: { responsive: true, maintainAspectRatio: true } 
                    });
                }
                
                const predictionCanvas = document.getElementById('predictionChart');
                if (predictionCanvas) {
                    const ctx2 = predictionCanvas.getContext('2d');
                    predictionChart = new Chart(ctx2, { 
                        type: 'line', 
                        data: { labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7'], datasets: [{ label: 'Predicted Waste (kg)', data: data.predictions, borderColor: '#2ecc71', backgroundColor: 'rgba(46,204,113,0.1)', fill: true, tension: 0.4 }] }, 
                        options: { responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${Math.round(ctx.raw)} kg` } } } } 
                    });
                }
                
                const historicalCanvas = document.getElementById('historicalChart');
                if (historicalCanvas) {
                    const historicalData = generateHistoricalData(data.current_waste);
                    const ctx3 = historicalCanvas.getContext('2d');
                    historicalChart = new Chart(ctx3, { 
                        type: 'line', 
                        data: { labels: historicalData.labels, datasets: [{ label: 'Historical Waste (kg)', data: historicalData.values, borderColor: '#e74c3c', backgroundColor: 'rgba(231,76,60,0.1)', fill: true, tension: 0.3 }] }, 
                        options: { responsive: true, maintainAspectRatio: true, plugins: { tooltip: { callbacks: { label: (ctx) => `${Math.round(ctx.raw)} kg` } } } } 
                    });
                }
            }, 100);
        }
        
        function generateHistoricalData(currentWaste) {
            const labels = [], values = []; 
            const today = new Date();
            for (let i = 29; i >= 0; i--) {
                const date = new Date(today); 
                date.setDate(today.getDate() - i);
                labels.push(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
                let variation = 1 + (Math.random() - 0.5) * 0.15;
                if (date.getDay() === 0 || date.getDay() === 6) variation *= 1.1;
                values.push(Math.round(currentWaste * variation * (0.7 + i / 100)));
            }
            return { labels, values };
        }
    </script>
</body>
</html>
